<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SORION — Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d1a;
    --surface: #13131f;
    --surface2: #1a1a2e;
    --surface3: #1f1f35;
    --border: #2a2a45;
    --border2: #3a3a60;
    --purple: #b060ff;
    --purple2: #8040cc;
    --purple-glow: rgba(176,96,255,0.15);
    --cyan: #00f5ff;
    --text: #e8e8ff;
    --text2: #9090c0;
    --muted: #505080;
    --limited: #ffb830;
    --rare: #ff5555;
    --sr: #7090ff;
    --up: #00f5a0;
    --down: #ff2d78;
    --shadow: 0 0 40px rgba(176,96,255,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(176,96,255,0.015) 2px, rgba(176,96,255,0.015) 4px);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: -200px; right: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(176,96,255,0.1) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    animation: pulse 4s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100%{opacity:0.6} 50%{opacity:1} }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 1600px;
    margin: 0 auto;
    padding: 0 32px 80px;
  }

  /* ── Header ─────────────────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 36px;
    position: relative;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0;
    height: 1px;
    background: linear-gradient(90deg, var(--purple), transparent);
    animation: scan 3s ease-in-out infinite;
  }

  @keyframes scan { 0%{width:0;opacity:1} 50%{width:60%;opacity:0.8} 100%{width:100%;opacity:0} }

  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
    text-decoration: none;
  }

  .logo img { height: 56px; width: auto; object-fit: contain; }

  .logo-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.3em;
    color: var(--purple);
    text-transform: uppercase;
    opacity: 0.8;
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 28px;
  }

  .nav-link {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text2);
    text-decoration: none;
    transition: color 0.2s;
  }

  .nav-link:hover { color: var(--purple); }
  .nav-link.active { color: var(--purple); }

  .nav-cta {
    background: transparent;
    border: 1px solid var(--purple);
    color: var(--purple);
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-decoration: none;
    padding: 9px 18px;
    border-radius: 4px;
    transition: all 0.2s;
    cursor: pointer;
    background: transparent;
  }

  .nav-cta:hover { background: var(--purple); color: var(--bg); box-shadow: 0 0 20px var(--purple2); }

  /* ── Login Screen ────────────────────────────────────────────── */
  #login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    text-align: center;
  }

  .login-icon {
    font-size: 64px;
    margin-bottom: 24px;
    filter: drop-shadow(0 0 20px var(--purple));
  }

  .login-title {
    font-family: 'Orbitron', monospace;
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 12px;
    text-shadow: 0 0 20px rgba(176,96,255,0.3);
  }

  .login-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 36px;
    letter-spacing: 0.05em;
    max-width: 400px;
    line-height: 1.6;
  }

  .btn-sorare {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: transparent;
    border: 1px solid var(--purple);
    color: var(--purple);
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 16px 32px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn-sorare::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--purple);
    transform: translateX(-100%);
    transition: transform 0.2s;
    z-index: -1;
  }

  .btn-sorare:hover { color: var(--bg); box-shadow: 0 0 30px var(--purple2); }
  .btn-sorare:hover::before { transform: translateX(0); }

  /* ── Portfolio Screen ────────────────────────────────────────── */
  #portfolio-screen { display: none; }

  /* Stats Bar */
  .portfolio-stats {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }

  .p-stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .p-stat::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: linear-gradient(180deg, var(--purple), var(--purple2));
  }

  .p-stat:hover { border-color: var(--purple2); }

  .p-stat-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--purple);
    margin-bottom: 6px;
    opacity: 0.8;
  }

  .p-stat-value {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    text-shadow: 0 0 15px rgba(176,96,255,0.2);
  }

  /* Controls */
  .p-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .p-search {
    flex: 1;
    min-width: 220px;
    max-width: 360px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .p-search:focus { border-color: var(--purple); box-shadow: 0 0 12px var(--purple-glow); }
  .p-search::placeholder { color: #404060; }

  .p-filter {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text2);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 10px 14px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .p-filter:hover { border-color: var(--purple2); color: var(--purple); }
  .p-filter.active { border-color: var(--purple); color: var(--purple); background: var(--purple-glow); }
  .p-filter.ltd.active { border-color: var(--limited); color: var(--limited); background: rgba(255,184,48,0.08); }
  .p-filter.rar.active { border-color: var(--rare); color: var(--rare); background: rgba(255,85,85,0.08); }
  .p-filter.sr.active  { border-color: var(--sr); color: var(--sr); background: rgba(112,144,255,0.08); }

  /* Cards Grid */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
  }

  .card-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s;
    cursor: pointer;
    position: relative;
  }

  .card-item:hover {
    border-color: var(--purple2);
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(176,96,255,0.1);
  }

  .card-img-wrap {
    position: relative;
    aspect-ratio: 3/4;
    overflow: hidden;
    background: var(--surface2);
  }

  .card-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s;
  }

  .card-item:hover .card-img { transform: scale(1.05); }

  .card-rarity {
    position: absolute;
    top: 8px; right: 8px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.1em;
    padding: 3px 7px;
    border-radius: 3px;
    border: 1px solid;
    backdrop-filter: blur(4px);
  }

  .card-rarity.limited { color: var(--limited); border-color: var(--limited); background: rgba(255,184,48,0.15); }
  .card-rarity.rare    { color: var(--rare);    border-color: var(--rare);    background: rgba(255,85,85,0.15); }
  .card-rarity.super_rare { color: var(--sr);   border-color: var(--sr);      background: rgba(112,144,255,0.15); }

  .card-info {
    padding: 12px;
  }

  .card-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
  }

  .card-team {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text2);
    margin-bottom: 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-fmv {
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--purple);
    text-shadow: 0 0 8px var(--purple-glow);
  }

  .card-fmv.no-data {
    color: var(--muted);
    font-size: 11px;
    font-family: 'Share Tech Mono', monospace;
  }

  /* Loading */
  .loading-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px;
    gap: 16px;
  }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border2);
    border-top-color: var(--purple);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--text2);
    letter-spacing: 0.1em;
  }

  .loading-progress {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--purple);
    letter-spacing: 0.05em;
  }

  /* Empty */
  .empty {
    text-align: center;
    padding: 80px;
    color: var(--text2);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
  }

  /* Skeleton */
  @keyframes shimmer {
    0%   { background-position: -400px 0; }
    100% { background-position:  400px 0; }
  }

  .skeleton {
    background: linear-gradient(90deg, var(--surface2) 25%, var(--surface3) 50%, var(--surface2) 75%);
    background-size: 400px 100%;
    animation: shimmer 1.4s ease-in-out infinite;
    border-radius: 4px;
  }

  .card-skeleton {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .card-skeleton-img {
    aspect-ratio: 3/4;
  }

  .card-skeleton-info {
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* Responsive */
  @media (max-width: 900px) { .portfolio-stats { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 600px) {
    .wrap { padding: 0 12px 60px; }
    .portfolio-stats { grid-template-columns: 1fr 1fr; gap: 8px; }
    .cards-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .logo img { height: 40px; }
    .logo-sub { display: none; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-item { animation: fadeUp 0.4s cubic-bezier(0.16,1,0.3,1) both; }
</style>
</head>
<body>

<div class="wrap">

  <!-- Header -->
  <header>
    <a class="logo" href="https://sorion.pro">
      <img src="logo.png" alt="SORION">
      <div class="logo-sub">// Portfolio</div>
    </a>
    <nav class="nav-links">
      <a class="nav-link" href="https://sorion.pro">Market</a>
      <a class="nav-link active" href="#">Portfolio</a>
      <a class="nav-link" href="https://craftlog.pro">Craft_LOG</a>
      <button class="nav-cta" id="btn-logout" onclick="logout()" style="display:none">Logout</button>
      <button class="nav-cta" id="btn-connect" onclick="loginWithSorare()">Connect Sorare</button>
    </nav>
  </header>

  <!-- Login Screen -->
  <div id="login-screen">
    <div class="login-icon">🎴</div>
    <div class="login-title">Your Sorare Portfolio</div>
    <div class="login-sub">Connect your Sorare account to see your full card collection with live FMV data, portfolio value and more.</div>
    <button class="btn-sorare" onclick="loginWithSorare()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
        <path d="M8 12l3 3 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Connect with Sorare
    </button>
  </div>

  <!-- Portfolio Screen -->
  <div id="portfolio-screen">

    <!-- Stats -->
    <div class="portfolio-stats">
      <div class="p-stat">
        <div class="p-stat-label">// Total Cards</div>
        <div class="p-stat-value" id="stat-total">—</div>
      </div>
      <div class="p-stat">
        <div class="p-stat-label">// Portfolio Value</div>
        <div class="p-stat-value" id="stat-value">—</div>
      </div>
      <div class="p-stat">
        <div class="p-stat-label">// Limited</div>
        <div class="p-stat-value" id="stat-limited" style="color:var(--limited)">—</div>
      </div>
      <div class="p-stat">
        <div class="p-stat-label">// Rare</div>
        <div class="p-stat-value" id="stat-rare" style="color:var(--rare)">—</div>
      </div>
      <div class="p-stat">
        <div class="p-stat-label">// Super Rare</div>
        <div class="p-stat-value" id="stat-sr" style="color:var(--sr)">—</div>
      </div>
    </div>

    <!-- Controls -->
    <div class="p-controls">
      <input class="p-search" id="p-search" type="text" placeholder="search player or team..." oninput="filterCards()">
      <button class="p-filter active" id="pf-all"     onclick="setFilter('all')">All</button>
      <button class="p-filter ltd"    id="pf-limited" onclick="setFilter('limited')">◆ Limited</button>
      <button class="p-filter rar"    id="pf-rare"    onclick="setFilter('rare')">◆ Rare</button>
      <button class="p-filter sr"     id="pf-sr"      onclick="setFilter('super_rare')">◆ SR</button>
      <span id="p-count" style="margin-left:auto;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text2)"></span>
    </div>

    <!-- Cards -->
    <div class="cards-grid" id="cards-grid"></div>

  </div>

</div>

<script>
  const SUPABASE_URL = 'https://jxhdlcpdupmkpsoytzes.supabase.co';
  const ANON_KEY     = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp4aGRsY3BkdXBta3Bzb3l0emVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NjQwMjQsImV4cCI6MjA4OTM0MDAyNH0.bvOQf7cF05GWafdb-vR7V9bphLjvgqTuY2BTLLGPnQM';
  const SORARE_CLIENT_ID = 'JwRtoOABm0DtyOM5_xDKlFaF2-gp7uUAS4bQeQcuUjw';
  const SORARE_CALLBACK  = 'https://sorion.pro/auth/callback';

  let allCards    = [];
  let filtered    = [];
  let fmvCache    = {};
  let activeFilter = 'all';

  // ── Auth ──────────────────────────────────────────────────────
  function loginWithSorare() {
    const returnTo = encodeURIComponent('https://sorion.pro/portfolio.html');
    const url = `https://sorare.com/oauth/authorize?client_id=${SORARE_CLIENT_ID}&redirect_uri=${encodeURIComponent('https://craftlog.pro/auth/callback')}&response_type=code&scope=&state=${returnTo}`;
    window.location.href = url;
  }

  function logout() {
    localStorage.removeItem('sorare_access_token');
    localStorage.removeItem('sorare_refresh_token');
    localStorage.removeItem('sorare_user');
    location.reload();
  }

  // ── Init ──────────────────────────────────────────────────────
  async function init() {
    // Handle OAuth callback
    const params = new URLSearchParams(window.location.search);
    const code   = params.get('code');
    if (code) {
      window.history.replaceState({}, '', window.location.pathname);
      await handleCallback(code);
      return;
    }

    const token = localStorage.getItem('sorare_access_token');
    const user  = localStorage.getItem('sorare_user');

    if (token && user) {
      showPortfolio();
    } else {
      showLogin();
    }
  }

  async function handleCallback(code) {
    document.getElementById('login-screen').innerHTML = `
      <div class="loading-wrap">
        <div class="spinner"></div>
        <div class="loading-text">Connecting to Sorare...</div>
      </div>`;

    try {
      // Exchange code
      const res = await fetch(`${SUPABASE_URL}/functions/v1/sorare-oauth`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + ANON_KEY },
        body: JSON.stringify({ action: 'exchange', code, redirect_uri: SORARE_CALLBACK }),
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);

      // Get user info
      const userRes = await fetch(`${SUPABASE_URL}/functions/v1/sorare-oauth`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + ANON_KEY },
        body: JSON.stringify({ action: 'userinfo', access_token: data.access_token }),
      });
      const user = await userRes.json();

      localStorage.setItem('sorare_access_token',  data.access_token);
      localStorage.setItem('sorare_refresh_token', data.refresh_token);
      localStorage.setItem('sorare_user',          JSON.stringify(user));

      showPortfolio();
    } catch(e) {
      document.getElementById('login-screen').innerHTML = `
        <div class="login-icon">✗</div>
        <div class="login-title" style="color:var(--down)">Connection Failed</div>
        <div class="login-sub">${e.message}</div>
        <button class="btn-sorare" onclick="loginWithSorare()">Try Again</button>`;
    }
  }

  function showLogin() {
    document.getElementById('login-screen').style.display    = 'flex';
    document.getElementById('portfolio-screen').style.display = 'none';
    document.getElementById('btn-connect').style.display     = '';
    document.getElementById('btn-logout').style.display      = 'none';
  }

  async function showPortfolio() {
    document.getElementById('login-screen').style.display    = 'none';
    document.getElementById('portfolio-screen').style.display = 'block';
    document.getElementById('btn-connect').style.display     = 'none';
    document.getElementById('btn-logout').style.display      = '';

    // Show user in header
    const user = JSON.parse(localStorage.getItem('sorare_user') || '{}');
    document.getElementById('btn-logout').textContent = `${user.nickname || user.slug} · Logout`;

    // Show skeletons
    showSkeletons();

    // Load cards
    await loadCards();
  }

  function showSkeletons() {
    const grid = document.getElementById('cards-grid');
    grid.innerHTML = Array.from({length: 12}, () => `
      <div class="card-skeleton">
        <div class="card-skeleton-img skeleton"></div>
        <div class="card-skeleton-info">
          <div class="skeleton" style="height:12px;width:80%"></div>
          <div class="skeleton" style="height:10px;width:60%"></div>
          <div class="skeleton" style="height:14px;width:40%"></div>
        </div>
      </div>`).join('');
  }

  // ── Load Cards ────────────────────────────────────────────────
  async function loadCards() {
    const token = localStorage.getItem('sorare_access_token');
    const grid  = document.getElementById('cards-grid');

    allCards = [];
    let cursor = null;
    let page   = 0;

    // Load all pages
    do {
      grid.innerHTML = `<div class="loading-wrap" style="grid-column:1/-1">
        <div class="spinner"></div>
        <div class="loading-text">Loading your collection...</div>
        <div class="loading-progress">${allCards.length} cards loaded</div>
      </div>`;

      const res = await fetch(`${SUPABASE_URL}/functions/v1/sorare-oauth`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + ANON_KEY },
        body: JSON.stringify({ action: 'cards', access_token: token, cursor }),
      });

      const data = await res.json();
      if (data.error) break;

      const nodes    = data.allNfts?.nodes ?? [];
      const pageInfo = data.allNfts?.pageInfo ?? {};

      allCards.push(...nodes);
      cursor = pageInfo.hasNextPage ? pageInfo.endCursor : null;
      page++;

    } while (cursor && page < 50); // max 50 pages = 2500 cards

    // Load FMV data from Supabase
    await loadFMV();

    // Render
    filterCards();
    updateStats();
  }

  async function loadFMV() {
    // Get unique player slugs
    const slugs = [...new Set(allCards.map(c => c.player?.slug).filter(Boolean))];
    if (!slugs.length) return;

    // Batch fetch FMV from card_prices
    const rarities = ['limited', 'rare', 'super_rare'];
    for (const rarity of rarities) {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/card_prices?scarcity=eq.${rarity}&player_slug=in.(${slugs.slice(0,100).map(s=>`"${s}"`).join(',')})&select=player_slug,fmv,floor_price,team_name`,
        { headers: { 'apikey': ANON_KEY, 'Authorization': 'Bearer ' + ANON_KEY } }
      );
      const data = await res.json();
      for (const row of data) {
        fmvCache[`${row.player_slug}_${rarity}`] = row;
      }
    }
  }

  // ── Filter & Render ───────────────────────────────────────────
  function setFilter(f) {
    activeFilter = f;
    ['all','limited','rare','sr'].forEach(k => {
      const el = document.getElementById(`pf-${k}`);
      if (el) el.classList.remove('active');
    });
    const map = { all:'all', limited:'limited', rare:'rare', super_rare:'sr' };
    document.getElementById(`pf-${map[f]||'all'}`).classList.add('active');
    filterCards();
  }

  function filterCards() {
    const search = document.getElementById('p-search').value.toLowerCase().trim();

    filtered = allCards.filter(c => {
      const rarity = c.rarityTyped?.toLowerCase() || '';
      if (activeFilter !== 'all' && rarity !== activeFilter) return false;
      if (search) {
        const name = (c.player?.displayName || '').toLowerCase();
        const fmvData = fmvCache[`${c.player?.slug}_${rarity}`];
        const team = (fmvData?.team_name || '').toLowerCase();
        if (!name.includes(search) && !team.includes(search)) return false;
      }
      return true;
    });

    renderCards();
    document.getElementById('p-count').textContent = `${filtered.length} cards`;
  }

  function renderCards() {
    const grid = document.getElementById('cards-grid');

    if (!filtered.length) {
      grid.innerHTML = `<div class="empty" style="grid-column:1/-1">// No cards found</div>`;
      return;
    }

    grid.innerHTML = filtered.map((c, i) => {
      const rarity   = c.rarityTyped?.toLowerCase() || 'limited';
      const rarityLabel = rarity === 'super_rare' ? 'SR' : rarity === 'rare' ? 'Rare' : 'Ltd';
      const fmvData  = fmvCache[`${c.player?.slug}_${rarity}`];
      const fmv      = fmvData?.fmv;
      const img      = c.player?.pictureUrl || '';
      const name     = c.player?.displayName || c.slug;
      const team     = fmvData?.team_name || '';

      return `<div class="card-item" style="animation-delay:${(i%20)*0.03}s">
        <div class="card-img-wrap">
          <img class="card-img" src="${img}" alt="" onerror="this.style.display='none'">
          <span class="card-rarity ${rarity}">${rarityLabel}</span>
        </div>
        <div class="card-info">
          <div class="card-name">${esc(name)}</div>
          <div class="card-team">${esc(team)}</div>
          ${fmv
            ? `<div class="card-fmv">€${fmv.toFixed(2)}</div>`
            : `<div class="card-fmv no-data">// no data</div>`
          }
        </div>
      </div>`;
    }).join('');
  }

  function updateStats() {
    const ltd = allCards.filter(c => c.rarityTyped?.toLowerCase() === 'limited');
    const rar = allCards.filter(c => c.rarityTyped?.toLowerCase() === 'rare');
    const sr  = allCards.filter(c => c.rarityTyped?.toLowerCase() === 'super_rare');

    document.getElementById('stat-total').textContent   = allCards.length.toLocaleString();
    document.getElementById('stat-limited').textContent = ltd.length;
    document.getElementById('stat-rare').textContent    = rar.length;
    document.getElementById('stat-sr').textContent      = sr.length;

    // Total portfolio value
    let total = 0;
    for (const c of allCards) {
      const rarity  = c.rarityTyped?.toLowerCase() || 'limited';
      const fmvData = fmvCache[`${c.player?.slug}_${rarity}`];
      if (fmvData?.fmv) total += fmvData.fmv;
    }

    document.getElementById('stat-value').textContent =
      total > 0 ? `€${total.toFixed(0)}` : '—';
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  init();
</script>
